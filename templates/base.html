{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================================
        META TAGS
    =========================================== -->

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="{% block description %}Vibhu Travel Hub - Premium Bus, Taxi, Tempo Traveller & Tour Packages{% endblock %}">

    <meta name="keywords"
        content="Travel, Taxi, Bus Rental, Tempo Traveller, Tour Packages, Coimbatore">

    <meta name="author"
        content="Vibhu Travel Hub">

    <title>
        {% block title %}
        Vibhu Travel Hub
        {% endblock %}
    </title>

    <link rel="icon"
      href="{% static 'images/logo/logo.JPG.jpeg' %}"
      type="image/jpeg">

{% block icon %}{% endblock %}

    <!-- ==========================================
        FAVICON
    =========================================== -->

    <!-- ==========================================
        GOOGLE FONTS
    =========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- ==========================================
        BOOTSTRAP CSS
    =========================================== -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ==========================================
        PROJECT CSS
    =========================================== -->

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

   
    {% block extra_css %}{% endblock %}

</head>

<body>

    
    <!-- ==========================================
        PAGE CONTENT
    =========================================== -->

    <main>

        {% block content %}

        {% endblock %}

    </main>

    <!-- ==========================================
        BOOTSTRAP JS
    =========================================== -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ==========================================
        PROJECT JS
    =========================================== -->

    

    {% block extra_js %}{% endblock %}



</body>

</html>
