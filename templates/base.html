{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================================
        META TAGS
    =========================================== -->

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- SEO Description -->

    <meta name="description"
          content="{% block description %}Vibhu Travel Hub offers premium taxi services, bus rentals, tempo travellers, corporate travel, pilgrimage trips and outstation tours in Coimbatore and across Tamil Nadu.{% endblock %}">

    <!-- SEO Keywords -->

    <meta name="keywords"
          content="{% block keywords %}Travel Agency Coimbatore, Taxi Service Coimbatore, Bus Rental Coimbatore, Tempo Traveller Rental, Corporate Travel, Outstation Tours, Pilgrimage Trips, Vibhu Travel Hub{% endblock %}">

    <meta name="author"
          content="Vibhu Travel Hub">

    <meta name="robots"
          content="index, follow">

    <!-- Canonical URL -->

    <link rel="canonical"
          href="{% block canonical %}https://www.vibhutravelhub.com/{% endblock %}">

    <!-- ==========================================
        TITLE
    =========================================== -->

    <title>
        {% block title %}
        Vibhu Travel Hub | Best Travel Agency in Coimbatore
        {% endblock %}
    </title>

    <!-- ==========================================
        FAVICON
    =========================================== -->

    <link rel="icon"
          href="{% static 'images/logo/logo.webp' %}"
          type="image/webp">

    {% block icon %}{% endblock %}

    <!-- ==========================================
        OPEN GRAPH (Facebook / WhatsApp)
    =========================================== -->

    <meta property="og:type"
          content="website">

    <meta property="og:site_name"
          content="Vibhu Travel Hub">

    <meta property="og:title"
          content="{% block og_title %}Vibhu Travel Hub{% endblock %}">

    <meta property="og:description"
          content="{% block og_description %}Premium Taxi, Bus Rental, Tempo Traveller & Tour Packages in Coimbatore.{% endblock %}">

    <meta property="og:url"
          content="{% block og_url %}https://www.vibhutravelhub.com/{% endblock %}">

    <meta property="og:image"
          content="https://www.vibhutravelhub.com/static/images/logo/og-banner.webp">

    <!-- ==========================================
        TWITTER CARD
    =========================================== -->

    <meta name="twitter:card"
          content="summary_large_image">

    <meta name="twitter:title"
          content="{% block twitter_title %}Vibhu Travel Hub{% endblock %}">

    <meta name="twitter:description"
          content="{% block twitter_description %}Premium Taxi, Bus Rental, Tempo Traveller & Tour Packages in Coimbatore.{% endblock %}">

    <meta name="twitter:image"
          content="https://www.vibhutravelhub.com/static/images/logo/og-banner.webp">

    <!-- ==========================================
        GOOGLE FONTS
    =========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- ==========================================
        BOOTSTRAP CSS
    =========================================== -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ==========================================
        PROJECT CSS
    =========================================== -->

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}

    <script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"Organization",
  "name":"Vibhu Travel Hub",
  "url":"https://www.vibhutravelhub.com",
  "logo":"https://www.vibhutravelhub.com/static/images/logo/logo.webp",
  "image":"https://www.vibhutravelhub.com/static/images/logo/logo.webp",
  "email":"mailto:vibhutravelhub66@gmail.com",
  "telephone":"+91-9655866660",
  "sameAs":[
    "https://www.instagram.com/vibhu_travelhub",
    "https://www.facebook.com/p/Vibhu-Travel-Hub-61590356873030/"
  ]
}

</script>

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"TravelAgency",
  "name":"Vibhu Travel Hub",
  "image":"https://www.vibhutravelhub.com/static/images/logo/logo.webp",
  "url":"https://www.vibhutravelhub.com",
  "telephone":"+91-9655866660",
  "email":"vibhutravelhub66@gmail.com",
  "address": {
  "@type": "PostalAddress",
  "streetAddress": "Joyce Villa Building, 87, Grey Town",
  "addressLocality": "Coimbatore",
  "addressRegion": "Tamil Nadu",
  "postalCode": "641018",
  "addressCountry": "IN"
},
  "priceRange":"₹₹₹",
  "openingHours":"Mo-Sa 09:30-22:00",
  "areaServed": {
  "@type": "State",
  "name": "Tamil Nadu"
},
"serviceType":[
  "Taxi Service",
  "Bus Rental",
  "Tempo Traveller",
  "Corporate Travel",
  "Pilgrimage Trips",
  "Outstation Tours"
],

"contactPoint":{
  "@type":"ContactPoint",
  "telephone":"+91-9655866660",
  "contactType":"customer service",
  "areaServed":"IN",
  "availableLanguage":[
    "English",
    "Tamil"
  ]
}

}
</script>



</head>

<body>

    <!-- ==========================================
        PAGE CONTENT
    =========================================== -->

    <main>

        {% block content %}
        {% endblock %}

    </main>

    <!-- ==========================================
        BOOTSTRAP JS
    =========================================== -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ==========================================
        PROJECT JS
    =========================================== -->

    {% block extra_js %}{% endblock %}

</body>

</html>
